<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: a4 portrait;
            margin: 0;
        }
        body {
            font-family: Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
        }
        .sidebar {
            width: 30%;
            background-color: #1e293b;
            color: white;
            height: 100%;
            padding: 40px 20px;
            float: left;
        }
        .main {
            width: 70%;
            float: right;
            padding: 40px 30px;
        }
        .name {
            font-size: 22pt;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .contact-item {
            font-size: 9pt;
            margin-bottom: 15px;
            color: #cbd5e1;
        }
        .label {
            font-weight: bold;
            color: #94a3b8;
            display: block;
            text-transform: uppercase;
            font-size: 8pt;
            margin-bottom: 3px;
        }
        .content {
            font-size: 11pt;
            line-height: 1.5;
            color: #334155;
            white-space: pre-wrap;
        }
        .date {
            font-weight: bold;
            color: #64748b;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="name">{{ user_name|default:"[Your Name]" }}</div>
            <div class="contact-item">
                <span class="label">Email</span>
                {{ user_email }}
            </div>
            <div class="contact-item">
                <span class="label">Phone</span>
                {{ user_phone }}
            </div>
            <div class="contact-item">
                <span class="label">LinkedIn</span>
                {{ user_linkedin }}
            </div>
            {% if user_github %}
            <div class="contact-item">
                <span class="label">GitHub</span>
                {{ user_github }}
            </div>
            {% endif %}
        </div>
        <div class="main">
            <div class="date">{{ current_date }}</div>
            <div class="content">
                {{ cover_letter_text|safe }}
            </div>
        </div>
    </div>
</body>
</html>
