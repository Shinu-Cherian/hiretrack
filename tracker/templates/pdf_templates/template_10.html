<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: a4 portrait;
            margin: 2cm;
        }
        body {
            font-family: Helvetica, sans-serif;
        }
        .header {
            margin-bottom: 40px;
        }
        .name {
            font-size: 20pt;
            font-weight: bold;
        }
        .content {
            white-space: pre-wrap;
            margin-bottom: 40px;
        }
        .signature {
            border-top: 1px solid #333;
            width: 200px;
            padding-top: 5px;
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="name">{{ user_name|default:"[Your Name]" }}</div>
        <div>
            {{ user_email }} | {{ user_phone }}
            {% if user_linkedin %} | {{ user_linkedin }}{% endif %}
            {% if user_github %} | {{ user_github }}{% endif %}
        </div>
    </div>
    <div class="content">
        {{ cover_letter_text|safe }}
    </div>
    <div class="signature">
        Digital Signature: {{ user_name }}
    </div>
</body>
</html>
