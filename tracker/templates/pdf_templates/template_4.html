<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: a4 portrait;
            margin: 2cm;
        }
        body {
            font-family: Helvetica, sans-serif;
            color: #444;
            line-height: 1.4;
            font-size: 10.5pt;
        }
        .name {
            font-size: 18pt;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #000;
            margin-bottom: 5px;
        }
        .contact {
            font-size: 8pt;
            letter-spacing: 1px;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 10px;
            margin-bottom: 50px;
        }
        .content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="name">{{ user_name|default:"[Your Name]" }}</div>
    <div class="contact">
        {{ user_email }} / {{ user_phone }}{% if user_linkedin %} / {{ user_linkedin }}{% endif %}{% if user_github %} / {{ user_github }}{% endif %}
    </div>
    <div class="content">
        {{ cover_letter_text|safe }}
    </div>
</body>
</html>
