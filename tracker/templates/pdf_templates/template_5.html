<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: a4 portrait;
            margin: 2cm;
        }
        body {
            font-family: "Courier New", Courier, monospace;
            color: #111;
            line-height: 1.2;
            font-size: 10pt;
        }
        .header {
            background-color: #f3f4f6;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 5px solid #111;
        }
        .name {
            font-size: 20pt;
            font-weight: bold;
        }
        .contact {
            margin-top: 10px;
        }
        .content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="name">root@{{ user_name|default:"candidate"|lower|cut:" " }}</div>
        <div class="contact">
            EMAIL: {{ user_email }}<br>
            PHONE: {{ user_phone }}<br>
            {% if user_linkedin %}LINKEDIN: {{ user_linkedin }}<br>{% endif %}
            {% if user_github %}GITHUB: {{ user_github }}<br>{% endif %}
        </div>
    </div>
    <div class="content">
        {{ cover_letter_text|safe }}
    </div>
</body>
</html>
