<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: a4 portrait;
            margin: 2cm;
        }
        body {
            font-family: Times, serif;
            border: 1px solid #ccc;
            padding: 1cm;
            min-height: 25cm;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .name {
            font-size: 22pt;
            font-weight: bold;
        }
        .content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="name">{{ user_name|default:"[Your Name]" }}</div>
        <div>
            {{ user_email }} &bull; {{ user_phone }}
            {% if user_linkedin %} &bull; {{ user_linkedin }}{% endif %}
            {% if user_github %} &bull; {{ user_github }}{% endif %}
        </div>
    </div>
    <div class="content">
        {{ cover_letter_text|safe }}
    </div>
</body>
</html>
