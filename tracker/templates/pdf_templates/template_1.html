<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: a4 portrait;
            margin: 2cm;
        }
        body {
            font-family: Helvetica, Arial, sans-serif;
            color: #333;
            line-height: 1.5;
            font-size: 11pt;
        }
        .header {
            border-bottom: 2px solid #2563eb;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .name {
            font-size: 24pt;
            font-weight: bold;
            color: #1e40af;
            margin-bottom: 5px;
        }
        .contact {
            font-size: 10pt;
            color: #666;
        }
        .date {
            margin-bottom: 20px;
            font-weight: bold;
        }
        .content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="name">{{ user_name|default:"[Your Name]" }}</div>
        <div class="contact">
            {% if user_address %}{{ user_address }}<br>{% endif %}
            {{ user_email }} | {{ user_phone }}<br>
            {{ user_linkedin }}{% if user_github %} | {{ user_github }}{% endif %}
        </div>
    </div>
    <div class="content">
        {{ cover_letter_text|safe }}
    </div>
</body>
</html>
