<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: a4 portrait;
            margin: 2cm;
        }
        body {
            font-family: Helvetica, sans-serif;
            color: #1f2937;
        }
        .name {
            font-size: 24pt;
            font-weight: 900;
            color: #ec4899;
            margin-bottom: 0;
        }
        .role {
            font-size: 12pt;
            color: #6366f1;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .content {
            white-space: pre-wrap;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="name">{{ user_name|default:"[Your Name]" }}</div>
    <div class="role">
        {{ user_email }} | {{ user_phone }}
        {% if user_linkedin %} | {{ user_linkedin }}{% endif %}
        {% if user_github %} | {{ user_github }}{% endif %}
    </div>
    <div class="content">
        {{ cover_letter_text|safe }}
    </div>
</body>
</html>
