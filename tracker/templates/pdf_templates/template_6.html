<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: a4 portrait;
            margin: 2cm;
        }
        body {
            font-family: Helvetica, sans-serif;
            color: #374151;
            line-height: 1.6;
            font-size: 11pt;
        }
        .header {
            color: #065f46;
            margin-bottom: 40px;
        }
        .name {
            font-size: 28pt;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .contact {
            color: #059669;
            font-weight: bold;
        }
        .content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="name">{{ user_name|default:"[Your Name]" }}</div>
        <div class="contact">
            {{ user_email }} | {{ user_phone }}
            {% if user_linkedin %}<br>{{ user_linkedin }}{% endif %}
            {% if user_github %} | {{ user_github }}{% endif %}
        </div>
    </div>
    <div class="content">
        {{ cover_letter_text|safe }}
    </div>
</body>
</html>
