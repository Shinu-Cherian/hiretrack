{% extends 'base.html' %}

{% block content %}
    <h2>Edit Referral</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Person Name:</label><br>
        <input type="text" name="person_name" value="{{ referral.person_name }}"><br><br>

        <label>Company:</label><br>
        <input type="text" name="company" value="{{ referral.company }}"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" value="{{ referral.email }}"><br><br>

        <label>Date:</label><br>
        <input type="date" name="date" value="{{ referral.date|date:'Y-m-d' }}"><br><br>

        <label>Status:</label><br>
        <select name="status">
            <option value="pending" {% if referral.status == 'pending' %}selected{% endif %}>Pending</option>
            <option value="replied" {% if referral.status == 'replied' %}selected{% endif %}>Replied</option>
            <option value="no_response" {% if referral.status == 'no_response' %}selected{% endif %}>No Response</option>
        </select><br><br>

        <label>Notes:</label><br>
        <textarea name="notes">{{ referral.notes }}</textarea><br><br>

        <button type="submit">Update Referral</button>
    </form>

{% endblock %}
