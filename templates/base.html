<!DOCTYPE html>
<html>
<head>
    <title>HireTrack</title>
</head>
<body>

    

    <h2>
        <a href="/" style="text-decoration:none; color:black;">
            HireTrack 🚀
        </a>
    </h2>
    <div style="float:right; margin:10px;">
    <a href="/notifications/" style="text-decoration:none; color:black; position:relative;">
        🔔
        {% if notifications|default:0 > 0 %}
            <span style="
                position:absolute;
                top:-5px;
                right:-10px;
                background:red;
                color:white;
                border-radius:50%;
                padding:2px 6px;
                font-size:12px;
            ">
                {{ notifications }}
            </span>
        {% endif %}
    </a>
    </div>

    {% block content %}
    {% endblock %}

</body>
</html>
